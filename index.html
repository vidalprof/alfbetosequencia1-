<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ilha das Letras - Aventura do Alfabeto</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Comic Sans MS", "Trebuchet MS", Verdana, "Segoe UI Emoji", "Segoe UI Symbol", "Apple Color Emoji", "Noto Color Emoji", "Android Emoji", sans-serif;
    background: #16a085;
    background: -webkit-gradient(linear, left top, left bottom, from(#7bed9f), color-stop(0.5,#2ecca7), to(#0e8a6e));
    background: -webkit-linear-gradient(top, #7bed9f, #2ecca7 50%, #0e8a6e);
    background: linear-gradient(to bottom, #7bed9f, #2ecca7 50%, #0e8a6e);
    background-attachment: fixed;
    min-height: 100vh;
    color: #2d3436;
  }
  /* fundo flutuante de letras */
  #ceu { position: fixed; top: 0; left: 0; width: 100%; height: 100%; overflow: hidden; pointer-events: none; z-index: 0; }
  .floatie { position: absolute; bottom: -50px; opacity: 0; font-weight: bold; -webkit-animation: subir linear infinite; animation: subir linear infinite; }
  .floatie.letra { color: rgba(255,255,255,0.22); }
  .floatie.estrela { color: rgba(255,223,100,0.7); text-shadow: 0 0 8px rgba(255,210,63,0.9), 0 0 16px rgba(255,210,63,0.5); }
  .floatie.brilho { -webkit-animation: subir linear infinite, cintila 2s ease-in-out infinite; animation: subir linear infinite, cintila 2s ease-in-out infinite; }
  @-webkit-keyframes cintila { 0%,100%{opacity:0.9;}50%{opacity:0.35;} }
  @keyframes cintila { 0%,100%{opacity:0.9;}50%{opacity:0.35;} }
  @-webkit-keyframes subir { 0%{-webkit-transform:translateY(0) rotate(0);opacity:0;}10%{opacity:0.9;}90%{opacity:0.9;}100%{-webkit-transform:translateY(-110vh) rotate(160deg);opacity:0;} }
  @keyframes subir { 0%{transform:translateY(0) rotate(0);opacity:0;}10%{opacity:0.9;}90%{opacity:0.9;}100%{transform:translateY(-110vh) rotate(160deg);opacity:0;} }
  .topbar, .wrap { position: relative; z-index: 1; }
  .topbar {
    background: -webkit-gradient(linear, left top, right top, from(#ff9f43), to(#ee5a24)); background: linear-gradient(to right,#ff9f43,#ee5a24);
    color: #fff; padding: 12px 16px;
    display: -webkit-box; display: flex; -webkit-box-pack: justify; justify-content: space-between; -webkit-box-align: center; align-items: center;
    box-shadow: 0 3px 12px rgba(0,0,0,0.3);
  }
  .topbar h1 { font-size: 19px; margin: 0; text-shadow: 0 2px 4px rgba(0,0,0,0.25); }
  .stats { font-size: 16px; font-weight: bold; }
  .star { color: #ffd23f; text-shadow: 0 0 6px rgba(255,210,63,0.9); }
  .btn-som { background: #ffd23f; border: none; border-radius: 50%; width: 38px; height: 38px; font-size: 19px; cursor: pointer; vertical-align: middle; margin-right: 6px; box-shadow: 0 3px 0 #d4ad00; }
  .btn-som:active { -webkit-transform: translateY(2px); transform: translateY(2px); box-shadow: 0 1px 0 #d4ad00; }
  .wrap { max-width: 680px; margin: 0 auto; padding: 16px; }
  .card { background: #fff; border-radius: 26px; padding: 24px; box-shadow: 0 10px 30px rgba(14,138,110,0.4), 0 0 0 4px rgba(255,255,255,0.3); text-align: center; }
  h1 { color: #0e8a6e; font-size: 28px; }
  h2 { color: #e67e22; font-size: 22px; margin: 8px 0; }
  .lead { color: #555; font-size: 18px; line-height: 1.5; }
  .progress { color: #888; font-size: 15px; margin-bottom: 4px; }
  .bar { background: #d6f5e8; border-radius: 10px; height: 16px; overflow: hidden; margin-bottom: 14px; }
  .bar i { display: block; height: 100%; background: -webkit-gradient(linear,left top,right top,from(#7bed9f),to(#16a085)); background: linear-gradient(to right,#7bed9f,#16a085); -webkit-transition: width .3s; transition: width .3s; }
  .hint { background: #fff7e0; border-radius: 14px; padding: 10px 14px; color: #b8860b; font-size: 16px; margin: 10px 0; }
  /* letra/numero grande em destaque */
  .letra-gigante { font-size: 90px; font-weight: bold; color: #0e8a6e; letter-spacing: 4px; margin: 10px 0; text-shadow: 0 4px 10px rgba(22,160,133,0.3); }
  .palavra-destaque { font-size: 60px; font-weight: bold; color: #0e8a6e; letter-spacing: 8px; margin: 14px 0; font-family: "Courier New", monospace; }
  .palavra-destaque .vazio { color: #ee5a24; border-bottom: 5px solid #ee5a24; padding: 0 6px; }
  .figura-emoji { font-size: 80px; margin: 6px 0; line-height: 1; }
  .seq-linha { font-size: 46px; font-weight: bold; color: #0e8a6e; letter-spacing: 6px; margin: 14px 0; }
  .seq-linha .vazio { color: #ee5a24; }
  /* botoes de opcao - letras grandes */
  .options { display: -webkit-box; display: flex; flex-wrap: wrap; -webkit-box-pack: center; justify-content: center; margin: 12px 0; }
  .opt {
    background: -webkit-gradient(linear,left top,left bottom,from(#54e0c7),to(#16a085)); background: linear-gradient(to bottom,#54e0c7,#16a085);
    color: #fff; border: none; border-radius: 18px; padding: 18px 28px; margin: 8px; font-family: inherit; font-size: 40px; font-weight: bold;
    cursor: pointer; box-shadow: 0 5px 0 #0e7a60, 0 7px 14px rgba(22,160,133,0.4); min-width: 80px;
  }
  .opt:active { -webkit-transform: translateY(2px); transform: translateY(2px); box-shadow: 0 3px 0 #0e7a60; }
  .opt.correct { background: -webkit-gradient(linear,left top,left bottom,from(#7bed9f),to(#27ae60)); background: linear-gradient(to bottom,#7bed9f,#27ae60); box-shadow: 0 5px 0 #1e7e46, 0 0 20px rgba(46,204,113,0.7); }
  .opt.wrong { background: #e74c3c; box-shadow: 0 5px 0 #b03a2e; }
  .opt.pequeno { font-size: 28px; padding: 14px 20px; min-width: 60px; }
  .btn-falar { background: -webkit-gradient(linear,left top,left bottom,from(#ff9f43),to(#ee5a24)); background: linear-gradient(to bottom,#ff9f43,#ee5a24); color: #fff; border: none; border-radius: 16px; padding: 12px 24px; font-family: inherit; font-size: 19px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #c0392b; margin: 8px; }
  .btn-falar:active { -webkit-transform: translateY(2px); transform: translateY(2px); box-shadow: 0 3px 0 #c0392b; }
  .feedback { font-size: 19px; margin: 12px 0; min-height: 26px; font-weight: bold; }
  .feedback.ok { color: #27ae60; }
  .feedback.no { color: #e74c3c; }
  .nav-btn { background: -webkit-gradient(linear,left top,left bottom,from(#ffe17a),to(#ffc107)); background: linear-gradient(to bottom,#ffe17a,#ffc107); color: #b8860b; border: none; border-radius: 16px; padding: 14px 30px; font-family: inherit; font-size: 19px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 0 #d4ad00, 0 7px 14px rgba(255,193,7,0.4); margin: 10px 5px; }
  .nav-btn:active { -webkit-transform: translateY(2px); transform: translateY(2px); box-shadow: 0 3px 0 #d4ad00; }
  .nav-btn.ghost { background: #eafaf3; color: #0e8a6e; box-shadow: 0 5px 0 #b5e6d4; }
  /* montar palavra: slots e pecas */
  .montar-slots { display: -webkit-box; display: flex; -webkit-box-pack: center; justify-content: center; flex-wrap: wrap; margin: 16px 0; }
  .slot { width: 56px; height: 64px; line-height: 64px; margin: 4px; border: 4px dashed #16a085; border-radius: 14px; font-size: 40px; font-weight: bold; color: #0e8a6e; background: #f4fffb; }
  .slot.cheio { border-style: solid; background: #d6f5e8; }
  .montar-pool { display: -webkit-box; display: flex; -webkit-box-pack: center; justify-content: center; flex-wrap: wrap; margin: 10px 0; }
  .peca { width: 58px; height: 66px; line-height: 66px; margin: 6px; border-radius: 14px; font-size: 38px; font-weight: bold; color: #fff;
    background: -webkit-gradient(linear,left top,left bottom,from(#a55eea),to(#8e44ad)); background: linear-gradient(to bottom,#a55eea,#8e44ad);
    border: none; cursor: pointer; box-shadow: 0 5px 0 #6c3483; }
  .peca:active { -webkit-transform: translateY(2px); transform: translateY(2px); box-shadow: 0 3px 0 #6c3483; }
  .peca.used { opacity: 0.3; }
  /* animações */
  @-webkit-keyframes pula { 0%{-webkit-transform:scale(1);}30%{-webkit-transform:scale(1.18) rotate(-3deg);}60%{-webkit-transform:scale(0.96);}100%{-webkit-transform:scale(1);} }
  @keyframes pula { 0%{transform:scale(1);}30%{transform:scale(1.18) rotate(-3deg);}60%{transform:scale(0.96);}100%{transform:scale(1);} }
  .anim-pula { -webkit-animation: pula .5s ease; animation: pula .5s ease; }
  /* comemoração ao acertar - CARIMBO CENTRAL que estoura */
  #carimbo { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; pointer-events: none; display: -webkit-box; display: flex; -webkit-box-pack: center; justify-content: center; -webkit-box-align: center; align-items: center; }
  .carimbo-wrap { position: relative; text-align: center; }
  /* anel de luz que se expande */
  .carimbo-anel { position: absolute; top: 50%; left: 50%; width: 120px; height: 120px; margin: -60px 0 0 -60px; border-radius: 50%; border: 8px solid #ffd23f; opacity: 0; -webkit-animation: anelexpande .7s ease-out forwards; animation: anelexpande .7s ease-out forwards; }
  .carimbo-anel.a2 { border-color: #ee5a24; -webkit-animation-delay: .12s; animation-delay: .12s; }
  @-webkit-keyframes anelexpande { 0%{-webkit-transform:scale(0.2);opacity:0.9;}100%{-webkit-transform:scale(2.6);opacity:0;} }
  @keyframes anelexpande { 0%{transform:scale(0.2);opacity:0.9;}100%{transform:scale(2.6);opacity:0;} }
  /* o círculo-carimbo central */
  .carimbo-circulo { width: 160px; height: 160px; border-radius: 50%; background: -webkit-gradient(linear,left top,left bottom,from(#7bed9f),to(#27ae60)); background: linear-gradient(to bottom,#7bed9f,#27ae60); box-shadow: 0 8px 24px rgba(0,0,0,0.3), inset 0 -6px 0 rgba(0,0,0,0.12); display: -webkit-box; display: flex; -webkit-box-pack: center; justify-content: center; -webkit-box-align: center; align-items: center; -webkit-animation: carimbobate .8s cubic-bezier(.2,1.5,.4,1) forwards; animation: carimbobate .8s cubic-bezier(.2,1.5,.4,1) forwards; }
  .carimbo-check { font-size: 90px; color: #fff; font-weight: bold; line-height: 1; text-shadow: 0 3px 6px rgba(0,0,0,0.2); }
  @-webkit-keyframes carimbobate { 0%{-webkit-transform:scale(0) rotate(-40deg);opacity:0;}45%{-webkit-transform:scale(1.25) rotate(8deg);opacity:1;}65%{-webkit-transform:scale(0.92) rotate(-3deg);}80%{-webkit-transform:scale(1.05) rotate(0);}88%{opacity:1;}100%{-webkit-transform:scale(1) rotate(0);opacity:0;} }
  @keyframes carimbobate { 0%{transform:scale(0) rotate(-40deg);opacity:0;}45%{transform:scale(1.25) rotate(8deg);opacity:1;}65%{transform:scale(0.92) rotate(-3deg);}80%{transform:scale(1.05) rotate(0);}88%{opacity:1;}100%{transform:scale(1) rotate(0);opacity:0;} }
  /* palavra que aparece embaixo */
  .carimbo-palavra { margin-top: 14px; font-size: 30px; font-weight: bold; color: #fff; text-shadow: 0 3px 8px rgba(0,0,0,0.4), 0 0 16px rgba(255,210,63,0.8); -webkit-animation: palavrapop .5s ease .15s both, somesuave .3s ease 1.1s forwards; animation: palavrapop .5s ease .15s both, somesuave .3s ease 1.1s forwards; }
  @-webkit-keyframes palavrapop { 0%{-webkit-transform:scale(0) translateY(20px);opacity:0;}70%{-webkit-transform:scale(1.2);}100%{-webkit-transform:scale(1) translateY(0);opacity:1;} }
  @keyframes palavrapop { 0%{transform:scale(0) translateY(20px);opacity:0;}70%{transform:scale(1.2);}100%{transform:scale(1) translateY(0);opacity:1;} }
  @-webkit-keyframes somesuave { to{opacity:0;} }
  @keyframes somesuave { to{opacity:0;} }
  /* estrelinhas que estouram do centro em 8 direções */
  .est-faisca { position: absolute; top: 50%; left: 50%; font-size: 28px; opacity: 0; }
  .ef1{-webkit-animation:ef1 .8s ease-out forwards;animation:ef1 .8s ease-out forwards;} .ef2{-webkit-animation:ef2 .8s ease-out forwards;animation:ef2 .8s ease-out forwards;}
  .ef3{-webkit-animation:ef3 .9s ease-out forwards;animation:ef3 .9s ease-out forwards;} .ef4{-webkit-animation:ef4 .9s ease-out forwards;animation:ef4 .9s ease-out forwards;}
  .ef5{-webkit-animation:ef5 .85s ease-out forwards;animation:ef5 .85s ease-out forwards;} .ef6{-webkit-animation:ef6 .85s ease-out forwards;animation:ef6 .85s ease-out forwards;}
  .ef7{-webkit-animation:ef7 .95s ease-out forwards;animation:ef7 .95s ease-out forwards;} .ef8{-webkit-animation:ef8 .95s ease-out forwards;animation:ef8 .95s ease-out forwards;}
  @-webkit-keyframes ef1{0%{-webkit-transform:translate(0,0) scale(.3);opacity:1;}100%{-webkit-transform:translate(-140px,-110px) scale(1.2);opacity:0;}} @keyframes ef1{0%{transform:translate(0,0) scale(.3);opacity:1;}100%{transform:translate(-140px,-110px) scale(1.2);opacity:0;}}
  @-webkit-keyframes ef2{0%{-webkit-transform:translate(0,0) scale(.3);opacity:1;}100%{-webkit-transform:translate(140px,-110px) scale(1.2);opacity:0;}} @keyframes ef2{0%{transform:translate(0,0) scale(.3);opacity:1;}100%{transform:translate(140px,-110px) scale(1.2);opacity:0;}}
  @-webkit-keyframes ef3{0%{-webkit-transform:translate(0,0) scale(.3);opacity:1;}100%{-webkit-transform:translate(-170px,20px) scale(1.2);opacity:0;}} @keyframes ef3{0%{transform:translate(0,0) scale(.3);opacity:1;}100%{transform:translate(-170px,20px) scale(1.2);opacity:0;}}
  @-webkit-keyframes ef4{0%{-webkit-transform:translate(0,0) scale(.3);opacity:1;}100%{-webkit-transform:translate(170px,20px) scale(1.2);opacity:0;}} @keyframes ef4{0%{transform:translate(0,0) scale(.3);opacity:1;}100%{transform:translate(170px,20px) scale(1.2);opacity:0;}}
  @-webkit-keyframes ef5{0%{-webkit-transform:translate(0,0) scale(.3);opacity:1;}100%{-webkit-transform:translate(-90px,-150px) scale(1.2);opacity:0;}} @keyframes ef5{0%{transform:translate(0,0) scale(.3);opacity:1;}100%{transform:translate(-90px,-150px) scale(1.2);opacity:0;}}
  @-webkit-keyframes ef6{0%{-webkit-transform:translate(0,0) scale(.3);opacity:1;}100%{-webkit-transform:translate(90px,-150px) scale(1.2);opacity:0;}} @keyframes ef6{0%{transform:translate(0,0) scale(.3);opacity:1;}100%{transform:translate(90px,-150px) scale(1.2);opacity:0;}}
  @-webkit-keyframes ef7{0%{-webkit-transform:translate(0,0) scale(.3);opacity:1;}100%{-webkit-transform:translate(-60px,120px) scale(1.2);opacity:0;}} @keyframes ef7{0%{transform:translate(0,0) scale(.3);opacity:1;}100%{transform:translate(-60px,120px) scale(1.2);opacity:0;}}
  @-webkit-keyframes ef8{0%{-webkit-transform:translate(0,0) scale(.3);opacity:1;}100%{-webkit-transform:translate(60px,120px) scale(1.2);opacity:0;}} @keyframes ef8{0%{transform:translate(0,0) scale(.3);opacity:1;}100%{transform:translate(60px,120px) scale(1.2);opacity:0;}}
  @-webkit-keyframes pulagrande { 0%{-webkit-transform:scale(1);}30%{-webkit-transform:scale(1.35) rotate(-5deg);}55%{-webkit-transform:scale(0.92);}75%{-webkit-transform:scale(1.12);}100%{-webkit-transform:scale(1);} }
  @keyframes pulagrande { 0%{transform:scale(1);}30%{transform:scale(1.35) rotate(-5deg);}55%{transform:scale(0.92);}75%{transform:scale(1.12);}100%{transform:scale(1);} }
  .anim-pulagrande { -webkit-animation: pulagrande .6s ease; animation: pulagrande .6s ease; }
  .premio-ganho { background: -webkit-gradient(linear,left top,left bottom,from(#fff7e0),to(#ffe9c7)); background: linear-gradient(#fff7e0,#ffe9c7); border: 3px solid #ffd23f; border-radius: 18px; padding: 12px; margin: 12px auto; max-width: 220px; box-shadow: 0 0 20px rgba(255,210,63,0.6); }
  .medalha-revela { -webkit-animation: medrevela 1s cubic-bezier(.2,1.4,.4,1) both, medbrilha2 2.5s ease-in-out 1s infinite; animation: medrevela 1s cubic-bezier(.2,1.4,.4,1) both, medbrilha2 2.5s ease-in-out 1s infinite; }
  @-webkit-keyframes medrevela { 0%{-webkit-transform:scale(0) rotate(-180deg);opacity:0;}60%{-webkit-transform:scale(1.2) rotate(10deg);opacity:1;}80%{-webkit-transform:scale(0.95) rotate(-4deg);}100%{-webkit-transform:scale(1) rotate(0);opacity:1;} }
  @keyframes medrevela { 0%{transform:scale(0) rotate(-180deg);opacity:0;}60%{transform:scale(1.2) rotate(10deg);opacity:1;}80%{transform:scale(0.95) rotate(-4deg);}100%{transform:scale(1) rotate(0);opacity:1;} }
  @-webkit-keyframes medbrilha2 { 0%,100%{-webkit-transform:rotate(-3deg);}50%{-webkit-transform:rotate(3deg);} }
  @keyframes medbrilha2 { 0%,100%{transform:rotate(-3deg);}50%{transform:rotate(3deg);} }
  .zeze-mapa { display: inline-block; vertical-align: middle; margin: 0 4px; -webkit-animation: pula 1.2s ease infinite; animation: pula 1.2s ease infinite; }
  @-webkit-keyframes tesourobrilha { 0%,100%{-webkit-transform:scale(1);} 50%{-webkit-transform:scale(1.2);} }
  @keyframes tesourobrilha { 0%,100%{transform:scale(1);} 50%{transform:scale(1.2);} }
  @-webkit-keyframes treme { 0%,100%{-webkit-transform:translateX(0);}25%{-webkit-transform:translateX(-7px);}75%{-webkit-transform:translateX(7px);} }
  @keyframes treme { 0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);} }
  .anim-treme { -webkit-animation: treme .4s ease; animation: treme .4s ease; }
  #confete { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
  .confete-peca { position: absolute; width: 11px; height: 15px; border-radius: 2px; }
  @-webkit-keyframes cair { 0%{-webkit-transform:translateY(-20px) rotate(0);opacity:1;}100%{-webkit-transform:translateY(110vh) rotate(540deg);opacity:0.9;} }
  @keyframes cair { 0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(110vh) rotate(540deg);opacity:0.9;} }
  /* MAPA */
  .mapa { position: relative; padding: 10px 0; }
  .mapa-linha { display: block; }
  .mapa-linha.esq { text-align: left; padding-left: 6%; }
  .mapa-linha.dir { text-align: right; padding-right: 6%; }
  .mapa-linha.centro { text-align: center; }
  .mapa-ilha { display: inline-block; width: 170px; border-radius: 20px; padding: 12px 6px; color: #fff; cursor: pointer; box-shadow: 0 5px 0 rgba(0,0,0,0.2); position: relative; background: #16a085; }
  .mapa-ilha:active { -webkit-transform: translateY(3px); transform: translateY(3px); }
  .mapa-ilha.lock { background: #b2bec3 !important; box-shadow: 0 5px 0 #8a9396; cursor: not-allowed; opacity: 0.85; }
  .mapa-ilha.atual { -webkit-animation: pulsa 1.4s ease-in-out infinite; animation: pulsa 1.4s ease-in-out infinite; }
  .mapa-ilha.lv0 { background: #16a085; } .mapa-ilha.lv1 { background: #ff9f43; } .mapa-ilha.lv2 { background: #a55eea; }
  .mapa-ilha.lv3 { background: #ee5a24; } .mapa-ilha.lv4 { background: #e84393; }
  @-webkit-keyframes pulsa { 0%,100%{box-shadow:0 5px 0 rgba(0,0,0,0.2);}50%{box-shadow:0 5px 0 rgba(0,0,0,0.2),0 0 0 6px rgba(255,210,63,0.55);} }
  @keyframes pulsa { 0%,100%{box-shadow:0 5px 0 rgba(0,0,0,0.2);}50%{box-shadow:0 5px 0 rgba(0,0,0,0.2),0 0 0 6px rgba(255,210,63,0.55);} }
  .mapa-num { position: absolute; top: -8px; left: -8px; background: #fff; color: #16a085; width: 28px; height: 28px; line-height: 28px; border-radius: 50%; font-size: 15px; font-weight: bold; box-shadow: 0 2px 0 rgba(0,0,0,0.13); }
  .mapa-icone { font-size: 34px; line-height: 1.1; }
  .mapa-nome { font-size: 14px; font-weight: bold; margin-top: 2px; }
  .mapa-conector { width: 5px; height: 24px; background: -webkit-repeating-linear-gradient(#ffd23f,#ffd23f 4px,transparent 4px,transparent 8px); background: repeating-linear-gradient(#ffd23f,#ffd23f 4px,transparent 4px,transparent 8px); margin: 2px auto; }
  .mapa-tesouro { display: inline-block; font-size: 54px; margin-top: 6px; -webkit-animation: pula 1.6s ease infinite; animation: pula 1.6s ease infinite; }
  .mapa-tesouro .mapa-nome { color: #ee5a24; font-size: 17px; }
  .extras { margin-top: 18px; padding-top: 14px; border-top: 2px dashed #d6f5e8; }
  .ext-btn { display: inline-block; margin: 5px; padding: 12px 20px; font-family: inherit; font-size: 16px; font-weight: bold; color: #fff; background: #a55eea; border: none; border-radius: 14px; cursor: pointer; box-shadow: 0 4px 0 #7d3cc9; }
  .ext-btn:active { -webkit-transform: translateY(2px); transform: translateY(2px); box-shadow: 0 2px 0 #7d3cc9; }
  .ext-btn.treino { background: #ff9f43; box-shadow: 0 4px 0 #d97e1a; }
  .ades-grid { display: -webkit-box; display: flex; flex-wrap: wrap; -webkit-box-pack: center; justify-content: center; margin: 16px 0; }
  .ades { width: 110px; margin: 8px; padding: 12px 6px; border-radius: 18px; position: relative; }
  .ades.on { background: -webkit-gradient(linear,left top,left bottom,from(#fff7e0),to(#ffe9c7)); background: linear-gradient(#fff7e0,#ffe9c7); border: 3px solid #ffd23f; }
  .ades.off { background: #eef2f0; border: 3px dashed #b0bec5; opacity: 0.7; }
  .ades-ic { font-size: 38px; }
  .ades-nome { font-size: 13px; font-weight: bold; color: #555; margin-top: 4px; }
  .ades-medalha { width: 110px; margin: 8px; padding: 6px; text-align: center; }

  .rel-faixa { font-size: 19px; color: #b8860b; font-weight: bold; }

  .rel-prof-tit { font-size: 20px; font-weight: bold; color: #16a085; margin-bottom: 8px; }
  .rel-resumo { font-size: 15px; color: #555; margin-bottom: 10px; }

  .rel-tab th, .rel-tab td { border: 1px solid #cfe8de; padding: 6px 8px; text-align: center; }

/* ===== UTIL ===== */
function embaralhar(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }
var ALFABETO="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
function letrasErradas(certa, qtd){
  var pool=ALFABETO.replace(certa,"").split(""); embaralhar(pool);
  var r=[certa]; for(var i=0;i<pool.length && r.length<qtd;i++) r.push(pool[i]); return embaralhar(r);
}

/* ===== AUDIO (voz forte para 1o ano) ===== */
var SOM_LIGADO=true, audioCtx=null;
function getCtx(){ if(audioCtx)return audioCtx; try{var AC=window.AudioContext||window.webkitAudioContext; audioCtx=new AC();}catch(e){audioCtx=null;} return audioCtx; }
function tocar(notas){ if(!SOM_LIGADO)return; var ctx=getCtx(); if(!ctx)return; var t=ctx.currentTime;
  for(var i=0;i<notas.length;i++){ var o=ctx.createOscillator(),g=ctx.createGain(); o.type=notas[i].tipo||'sine'; o.frequency.value=notas[i].f;
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.25,t+0.02); g.gain.exponentialRampToValueAtTime(0.0001,t+notas[i].d);
    o.connect(g); g.connect(ctx.destination); o.start(t); o.stop(t+notas[i].d); t+=notas[i].d; } }
function somAcerto(){ tocar([{f:660,d:0.12},{f:880,d:0.16}]); }
function somErro(){ tocar([{f:200,d:0.18,tipo:'square'}]); }
function somFanfarra(){ tocar([{f:523,d:0.14},{f:659,d:0.14},{f:784,d:0.14},{f:1047,d:0.30}]); }
function somClique(){ tocar([{f:520,d:0.06}]); }
function falar(texto){ if(!SOM_LIGADO)return; if(!('speechSynthesis' in window))return;
  try{ window.speechSynthesis.cancel(); var u=new SpeechSynthesisUtterance(texto); u.lang='pt-BR'; u.rate=0.85; u.pitch=1.1;
    var vs=window.speechSynthesis.getVoices(); for(var i=0;i<vs.length;i++){ if(/pt/i.test(vs[i].lang)){u.voice=vs[i];break;} }
    window.speechSynthesis.speak(u); }catch(e){} }
/* fala uma letra pelo SOM dela seria ideal, mas lemos o nome da letra */
function falarLetra(L){ falar(L); }
function toggleSom(){ SOM_LIGADO=!SOM_LIGADO; if(!SOM_LIGADO&&'speechSynthesis' in window){try{window.speechSynthesis.cancel();}catch(e){}}
  var b=document.getElementById('btnSom'); if(b)b.innerHTML=SOM_LIGADO?'🔊':'🔇'; if(SOM_LIGADO)somClique(); }

function confete(qtd){ var cores=['#ee5a24','#ffd23f','#27ae60','#16a085','#e84393','#a55eea'];
  var box=document.getElementById('confete'); if(!box){box=document.createElement('div');box.id='confete';document.body.appendChild(box);}
  for(var i=0;i<qtd;i++){ var p=document.createElement('div'); p.className='confete-peca'; p.style.left=(Math.random()*100)+'%';
    p.style.background=cores[Math.floor(Math.random()*cores.length)]; var dur=(1.6+Math.random()*1.4);
    p.style.webkitAnimation='cair '+dur+'s linear forwards'; p.style.animation='cair '+dur+'s linear forwards'; p.style.animationDelay=(Math.random()*0.3)+'s';
    box.appendChild(p); (function(el){setTimeout(function(){if(el&&el.parentNode)el.parentNode.removeChild(el);},3200);})(p); } }

/* ===== COMEMORAÇÃO ao acertar: CARIMBO central que estoura ===== */
var FRASES_FESTA=["ACERTOU!","MUITO BEM!","BOA!","ISSO!","UHUUL!","PERFEITO!"];
function comemorar(){
  var velho=document.getElementById('carimbo'); if(velho&&velho.parentNode) velho.parentNode.removeChild(velho);
  var div=document.createElement('div'); div.id='carimbo';
  var frase=FRASES_FESTA[Math.floor(Math.random()*FRASES_FESTA.length)];
  var simbolos=["⭐","✨","🌟","💫"];
  var inner='<div class="carimbo-wrap">';
  /* estrelinhas que estouram do centro em 8 direções */
  for(var i=0;i<8;i++){ inner+='<span class="est-faisca ef'+(i+1)+'">'+simbolos[i%simbolos.length]+'</span>'; }
  /* anéis de luz */
  inner+='<span class="carimbo-anel"></span><span class="carimbo-anel a2"></span>';
  /* círculo central com o check */
  inner+='<div class="carimbo-circulo"><span class="carimbo-check">✓</span></div>';
  /* palavra animada */
  inner+='<div class="carimbo-palavra">'+frase+'</div>';
  inner+='</div>';
  div.innerHTML=inner;
  document.body.appendChild(div);
  setTimeout(function(){ if(div&&div.parentNode) div.parentNode.removeChild(div); }, 1500);
}

function iniciarFase(chave){ somClique(); if(chave==="meunome") montarFaseMeuNome(); faseAtual=chave; indiceAtual=0; mostrarDesafio(); }
function mostrarDesafio(){
  respondeu=false;
  var fase=FASES[faseAtual], dd=fase.desafios[indiceAtual], total=fase.desafios.length, pct=Math.round((indiceAtual/total)*100);
  if(dd.tipo==="montar"){ mostrarMontar(); return; }
  var html='<div class="progress">Desafio '+(indiceAtual+1)+' de '+total+'</div>';
  html+='<div class="bar"><i style="width:'+pct+'%"></i></div>';
  html+='<h2>'+fase.icone+' '+fase.titulo+'</h2><div class="hint">💡 '+fase.dica+'</div>';
  html+='<div class="lead" style="font-weight:bold;color:#333">'+dd.enunciado+'</div>';
  if(dd.figura) html+='<div class="figura-emoji" id="figatual">'+figura(dd.legenda||dd.palavra, dd.figura)+'</div>';
  if(dd.letraMisterio) html+='<div class="letra-gigante" style="font-size:70px">🔊❓</div>';
  if(dd.letraGigante) html+='<div class="letra-gigante">'+dd.letraGigante+'</div>';
  if(dd.palavraHTML) html+='<div class="palavra-destaque">'+dd.palavraHTML+'</div>';
  if(dd.seq) html+='<div class="seq-linha">'+dd.seq+'</div>';
  html+='<div><button class="btn-falar" onclick="falar(\''+(dd.falar.replace(/'/g,""))+'\')">🔊 Ouvir de novo</button></div>';
  var optcls="opt"+(dd.classeOpt===""?" pequeno":(dd.classeOpt?(" "+dd.classeOpt):""));
  // letras grandes para letras isoladas, "pequeno" para vogais multiplas/numeros
  if(dd.opcoes.join("").length<=5 && !dd.classeOpt && dd.opcoes[0].length===1){ optcls="opt"; }
  html+='<div class="options">';
  for(var i=0;i<dd.opcoes.length;i++) html+='<button class="'+optcls+'" id="opt'+i+'" onclick="respEscolha(\''+dd.opcoes[i]+'\','+i+')">'+dd.opcoes[i]+'</button>';
  html+='</div><div class="feedback" id="fb"></div><div id="navarea"></div>';
  card.innerHTML=html;
  setTimeout(function(){ falar(dd.falar); }, 350);
}
function botaoProximo(){
  var nav=document.getElementById("navarea"), ultimo=(indiceAtual===FASES[faseAtual].desafios.length-1);
  if(ultimo && treinoAtivo) nav.innerHTML='<button class="nav-btn" onclick="fimTreino()">Terminar treino 🌟</button>';
  else if(ultimo) nav.innerHTML='<button class="nav-btn" onclick="telaFinal()">Ver resultado 🏁</button>';
  else nav.innerHTML='<button class="nav-btn" onclick="proximo()">Próximo ➜</button>';
}
function guardarErro(dd){ var jaTem=false; for(var z=0;z<ERROS.length;z++){ if(ERROS[z]===dd) jaTem=true; } if(!jaTem&&!treinoAtivo) ERROS.push(dd); }
function respEscolha(val, idx){
  if(respondeu)return; respondeu=true;
  var fase=FASES[faseAtual], dd=fase.desafios[indiceAtual], fb=document.getElementById("fb"), btn=document.getElementById("opt"+idx), pts=fase.bonus?15:10;
  if(val===dd.certa){ registrar(faseAtual,true); addPontos(pts); btn.className=btn.className+" correct"; fb.className="feedback ok"; fb.innerHTML="🎉 Muito bem! "+dd.explica; somAcerto(); confete(70); comemorar(); var fig=document.getElementById("figatual"); if(fig)fig.className=fig.className+" anim-pulagrande"; falar("Muito bem! "+(dd.falaCerta||"")); }
  else { registrar(faseAtual,false); btn.className=btn.className+" wrong"; fb.className="feedback no"; fb.innerHTML="🤔 Quase! O certo é "+dd.certa+". "+dd.explica; somErro(); guardarErro(dd); falar("Quase! O certo é "+(dd.falaCerta||dd.certa));
    for(var i=0;i<dd.opcoes.length;i++){ if(dd.opcoes[i]===dd.certa){ var b2=document.getElementById("opt"+i); b2.className=b2.className+" correct"; } } }
  botaoProximo();
}
function proximo(){ indiceAtual++; mostrarDesafio(); }

/* ===== ENGINE: montar palavra ===== */
var mtSlots=[], mtPecas=[];
function mostrarMontar(){
  respondeu=false;
  var fase=FASES[faseAtual], dd=fase.desafios[indiceAtual], total=fase.desafios.length, pct=Math.round((indiceAtual/total)*100);
  var palavra=dd.palavra;
  mtSlots=[]; for(var i=0;i<palavra.length;i++) mtSlots.push(null);
  mtPecas=[]; for(var j=0;j<palavra.length;j++) mtPecas.push({L:palavra.charAt(j), used:false});
  embaralhar(mtPecas);
  renderMontar();
  setTimeout(function(){ falar(dd.falar); }, 350);
}
function renderMontar(){
  var fase=FASES[faseAtual], dd=fase.desafios[indiceAtual], total=fase.desafios.length, pct=Math.round((indiceAtual/total)*100);
  var html='<div class="progress">Desafio '+(indiceAtual+1)+' de '+total+'</div>';
  html+='<div class="bar"><i style="width:'+pct+'%"></i></div>';
  html+='<h2>'+fase.icone+' '+fase.titulo+'</h2><div class="hint">💡 '+fase.dica+'</div>';
  if(dd.semFigura) html+='<div class="figura-emoji" style="font-size:56px">📛✨</div>';
  else html+='<div class="figura-emoji">'+figura(dd.palavra||dd.legenda, dd.figura)+'</div>';
  html+='<div><button class="btn-falar" onclick="falar(\''+(dd.falar.replace(/'/g,""))+'\')">🔊 Ouvir de novo</button></div>';
  html+='<div class="montar-slots">';
  for(var i=0;i<mtSlots.length;i++){ var v=mtSlots[i]; html+='<div class="slot'+(v!==null?' cheio':'')+'" onclick="tirarSlot('+i+')">'+(v!==null?v.L:'')+'</div>'; }
  html+='</div><div class="montar-pool">';
  for(var j=0;j<mtPecas.length;j++){ var p=mtPecas[j]; html+='<button class="peca'+(p.used?' used':'')+'" onclick="porPeca('+j+')">'+p.L+'</button>'; }
  html+='</div><div class="feedback" id="fb"></div><div id="navarea"></div>';
  card.innerHTML=html;
}
function porPeca(j){
  if(respondeu)return; var p=mtPecas[j]; if(p.used)return;
  for(var i=0;i<mtSlots.length;i++){ if(mtSlots[i]===null){ mtSlots[i]={L:p.L, from:j}; p.used=true; somClique(); break; } }
  renderMontar(); checarMontar();
}
function tirarSlot(i){
  if(respondeu)return; var v=mtSlots[i]; if(v===null)return;
  if(typeof v.from==="number" && mtPecas[v.from]) mtPecas[v.from].used=false;
  mtSlots[i]=null; somClique(); renderMontar();
}
function checarMontar(){
  for(var i=0;i<mtSlots.length;i++){ if(mtSlots[i]===null) return; }
  var fase=FASES[faseAtual], dd=fase.desafios[indiceAtual], montada=""; for(var k=0;k<mtSlots.length;k++) montada+=mtSlots[k].L;
  var fb=document.getElementById("fb"), pts=fase.bonus?15:10;
  respondeu=true;
  if(montada===dd.palavra){ registrar(faseAtual,true); addPontos(pts); fb.className="feedback ok"; fb.innerHTML="🎉 "+dd.explica; somAcerto(); confete(80); comemorar(); falar("Muito bem! "+(dd.falaCerta||dd.palavra)); botaoProximo(); }
  else { registrar(faseAtual,false); fb.className="feedback no"; fb.innerHTML="🤔 Hmm, não foi essa ordem. Tente de novo!"; somErro(); guardarErro(dd); falar("Quase! Tente de novo."); 
    respondeu=false; setTimeout(function(){ for(var z=0;z<mtSlots.length;z++)mtSlots[z]=null; for(var y=0;y<mtPecas.length;y++)mtPecas[y].used=false; renderMontar(); }, 1200); }
}

/* ===== TREINO ===== */
function iniciarTreino(){ if(ERROS.length===0)return; treinoAtivo=true; somClique();
  FASES._treino={ titulo:"💪 Treino dos Erros", cor:"lv3", icone:"💪", bonus:false, dica:"Vamos tentar de novo o que foi difícil. Você consegue!", desafios:ERROS.slice() };
  faseAtual="_treino"; indiceAtual=0; mostrarDesafio(); }
function fimTreino(){ treinoAtivo=false;
  var html='<div class="anim-pula">'+mascote(110,"feliz")+'</div><h1>Treino completo!</h1>';
  html+='<p class="lead">Muito bem, '+(ALUNO||'explorador')+'! Tentar de novo é coisa de gente esperta.</p>';
  html+='<div class="big-score">★ '+score+'</div><button class="nav-btn ghost" onclick="telaMenu()">🏠 Mapa</button>';
  card.innerHTML=html; somFanfarra(); confete(60); ERROS=[]; salvar();
}

/* ===== TELA FINAL DA FASE ===== */
function telaFinal(){
  var fase=FASES[faseAtual]; var jaTinha=concluidas[faseAtual]===true; concluidas[faseAtual]=true; statFase(faseAtual).feita=true; salvar();
  var s=STATS[faseAtual], total=s.acertos+s.erros, pct=total?Math.round(s.acertos/total*100):0;
  var html='<div class="anim-pula">'+mascote(110,"feliz")+'</div>';
  html+='<h1>Parada completa!</h1><h2>'+fase.icone+' '+fase.titulo+'</h2>';
  html+='<div class="big-score">★ '+score+'</div>';
  html+='<p class="lead">Você acertou <b>'+s.acertos+'</b> de <b>'+total+'</b>! 🎉</p>';
  var prem=PREMIOS[faseAtual], medal=MEDALHAS["MED_"+prem];
  if(medal){
    html+='<div class="premio-ganho"><div style="font-size:17px;color:#e67e22;font-weight:bold;margin-bottom:6px">🎁 Você ganhou uma medalha!</div>';
    html+='<img src="'+medal+'" alt="'+prem+'" class="medalha-revela" style="width:150px;height:150px" /></div>';
  }
  var prox=null; for(var i=0;i<ORDEM.length-1;i++){ if(ORDEM[i]===faseAtual){prox=ORDEM[i+1];break;} }
  if(prox) html+='<button class="nav-btn" onclick="iniciarFase(\''+prox+'\')">Próxima parada ➜</button>';
  else html+='<button class="nav-btn" onclick="telaRelatorio()">Ver tudo! '+svgTrofeu(22)+'</button>';
  html+='<br><button class="nav-btn ghost" onclick="telaAdesivos()">🏅 Ver figurinhas</button>';
  html+='<button class="nav-btn ghost" onclick="telaMenu()">🏠 Mapa</button>';
  card.innerHTML=html; somFanfarra(); confete(90); falar("Muito bem! Você ganhou uma medalha!");
}

/* ===== RELATORIO ===== */
function telaRelatorio(){
  var totalAc=0, totalErr=0, fasesFeitas=0;
  for(var k in STATS){ if(STATS[k].feita){ totalAc+=STATS[k].acertos; totalErr+=STATS[k].erros; fasesFeitas++; } }
  var totalTent=totalAc+totalErr, aproveit=totalTent?Math.round(totalAc/totalTent*100):0;
  var medalha=aproveit>=90?'🥇':aproveit>=70?'🥈':'🥉', faixa=aproveit>=90?'Mestre das Letras!':aproveit>=70?'Muito bom!':'Continue praticando!';
  var estrelas=Math.round(score/50);
  var html='<div class="rel-festa"><div class="anim-pula">'+mascote(120,"feliz")+'</div><div class="rel-medalha">'+medalha+'</div>';
  html+='<h1>Aventura completa!</h1>';
  if(ALUNO) html+='<div style="font-size:20px;font-weight:bold;color:#0e8a6e;margin-bottom:6px">Aluno(a): '+ALUNO+'</div>';
  html+='<div class="rel-faixa">'+faixa+'</div><div class="rel-estrelas">';
  var ch=Math.min(estrelas,15); for(var e=0;e<ch;e++)html+='★'; html+='</div>';
  html+='<div class="big-score">'+score+' pontos &middot; '+totalAc+' acertos</div>';
  html+='<p class="lead">Você aprendeu as vogais, a ordem do alfabeto, a primeira letra das palavras e até montou palavras sozinho. Parabéns!</p></div>';
  html+='<div class="rel-prof"><div class="rel-prof-tit">📋 Relatório para o professor</div>';
  html+='<div class="rel-resumo">Atividades concluídas: <b>'+fasesFeitas+' de '+ORDEM.length+'</b> &middot; Aproveitamento: <b>'+aproveit+'%</b> &middot; Tentativas: <b>'+totalTent+'</b></div>';
  html+='<table class="rel-tab"><tr><th>Atividade</th><th>Acertos</th><th>Erros</th><th>%</th></tr>';
  var revisar=[];
  for(var i=0;i<ORDEM.length;i++){ var key=ORDEM[i], st=STATS[key]; if(!st||!st.feita)continue;
    var t=st.acertos+st.erros, p=t?Math.round(st.acertos/t*100):0, cor=p>=70?'#27ae60':'#e67e22';
    html+='<tr><td>'+FASES[key].titulo+'</td><td>'+st.acertos+'</td><td>'+st.erros+'</td><td style="color:'+cor+';font-weight:bold">'+p+'%</td></tr>';
    if(p<70) revisar.push(FASES[key].titulo); }
  html+='</table>';
  if(revisar.length) html+='<p style="margin-top:10px;font-size:14px;color:#e67e22"><b>Sugestão de revisão:</b> '+revisar.join(", ")+'.</p>';
  else html+='<p style="margin-top:10px;font-size:14px;color:#27ae60"><b>Ótimo desempenho em todas as atividades!</b></p>';
  html+='<p style="font-size:13px;color:#888;margin-top:8px">Dica: use Ctrl+P para imprimir ou salvar em PDF.</p></div>';
  html+='<button class="nav-btn ghost" onclick="telaMenu()">🏠 Mapa</button><button class="nav-btn ghost" onclick="reiniciarTudo()">🔄 Recomeçar</button>';
  card.innerHTML=html;
}

/* ===== TELA INICIO ===== */
function telaInicio(){
  var tem=carregar();
  var html='<h1>🔤 Ilha das Letras</h1><h2>Aventura do Alfabeto!</h2>';
  if(tem && ALUNO){
    var feitas=0; for(var k in concluidas){if(concluidas[k])feitas++;}
    html+='<div class="anim-pula">'+mascote(120,"feliz")+'</div>';
    html+='<p class="lead">Oi de novo, <b>'+ALUNO+'</b>!<br>Você tem <b>'+score+'</b> pontos e <b>'+feitas+'</b> troféus.</p>';
    html+='<button class="nav-btn" onclick="telaMenu()">Continuar ➜</button><br><button class="nav-btn ghost" onclick="reiniciarTudo()">🔄 Começar do zero</button>';
  } else {
    html+='<div class="anim-pula">'+mascote(150,"feliz")+'</div><p class="lead">Oi! Eu sou a <b>Zezé</b>, a abelhinha!<br>Qual é o seu nome?</p>';
    html+='<input class="inp-nome" id="inpNome" type="text" maxlength="20" placeholder="Seu nome" />';
    html+='<br><button class="nav-btn" onclick="comecarComNome()">Começar! 🚀</button>';
  }
  card.innerHTML=html;
  var inp=document.getElementById("inpNome"); if(inp){ inp.onkeydown=function(e){if(e.keyCode===13)comecarComNome();}; inp.focus(); }
  setTimeout(function(){ falar(tem&&ALUNO ? ("Oi de novo, "+ALUNO) : "Oi! Eu sou a Zezé, a abelhinha. Qual é o seu nome?"); }, 400);
}
function comecarComNome(){ var inp=document.getElementById("inpNome");
  ALUNO=(inp&&inp.value? inp.value.replace(/[<>]/g,'').trim():"")||"Explorador(a)"; somClique(); salvar(); falar("Vamos lá, "+ALUNO+"!"); telaMenu(); }
function reiniciarTudo(){ somClique();
  var html='<div style="font-size:60px">🔄</div><h1>Começar do zero?</h1>';
  html+='<p class="lead">Isso apaga o nome, os pontos e os troféus para recomeçar.</p>';
  html+='<button class="nav-btn" onclick="confirmarReset()">Sim, apagar tudo</button><br><button class="nav-btn ghost" onclick="telaMenu()">Não, voltar</button>';
  card.innerHTML=html; }
function confirmarReset(){ apagarProgresso(); somClique(); telaInicio(); }

montarCeu();
telaInicio();

</script>
